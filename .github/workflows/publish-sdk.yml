name: Publish SDK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: SDK version to publish
        required: true
        type: string
      tag:
        description: npm dist-tag
        required: false
        default: latest
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ]; then
            echo "Missing required version input" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ github.event.inputs.tag || 'latest' }}
        run: |
          node ./scripts/release-packages.mjs publish --version "${{ steps.version.outputs.value }}" --tag "${{ github.event.inputs.tag || 'latest' }}"

  notify-templates:
    needs: publish
    uses: ./.github/workflows/notify-template-repos.yml
    with:
      version: ${{ needs.publish.outputs.version }}
    secrets: inherit

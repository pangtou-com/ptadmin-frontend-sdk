name: Notify Template Repositories

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published SDK version to sync
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: Published SDK version to sync
        required: true
        type: string

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repository events
        env:
          SDK_VERSION: ${{ inputs.version || github.event.inputs.version }}
          TEMPLATE_REPOSITORIES: ${{ vars.FRONTEND_TEMPLATE_REPOSITORIES }}
          GH_TOKEN: ${{ secrets.FRONTEND_TEMPLATE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TEMPLATE_REPOSITORIES" ]; then
            echo "Missing repository variable FRONTEND_TEMPLATE_REPOSITORIES" >&2
            exit 1
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "Missing secret FRONTEND_TEMPLATE_DISPATCH_TOKEN" >&2
            exit 1
          fi

          printf '%s\n' "$TEMPLATE_REPOSITORIES" | while IFS= read -r repo; do
            [ -n "$repo" ] || continue
            curl -sSf -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$repo/dispatches" \
              -d "{\"event_type\":\"sdk-release\",\"client_payload\":{\"version\":\"$SDK_VERSION\"}}"
          done
